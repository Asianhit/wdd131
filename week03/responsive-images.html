<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <meta name="author" content="Samuel Christian Asian">
    <meta name="description" content="This is a m=demo demonstration for responsive images.">

</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/reno-large.webp" media="(min-width: 1000px)">
                <source srcset="images/reno-medium.webp" media="(min-width: 550px)">
                <img src="images/reno-small.webp" alt="Reno Temple" width="1500" height="750">
            </picture>
        </div>
    </main>
</body>
</html>
